<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TensorBoard Live Refresh</title>
    <style>
      html,
      body,
      iframe {
        border: 0;
        height: 100%;
        margin: 0;
        padding: 0;
        width: 100%;
      }
      body {
        background: #111;
        overflow: hidden;
      }
      .status {
        background: rgba(0, 0, 0, 0.55);
        border-radius: 4px;
        bottom: 8px;
        color: #f5f5f5;
        font: 12px/1.3 system-ui, sans-serif;
        padding: 5px 7px;
        pointer-events: none;
        position: fixed;
        right: 8px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <iframe id="tensorboard" title="TensorBoard"></iframe>
    <div id="status" class="status"></div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get("url") || "http://localhost:6006/";
      const seconds = Math.max(2, Number(params.get("seconds") || "8"));
      const iframe = document.getElementById("tensorboard");
      const status = document.getElementById("status");

      function cacheBustedUrl() {
        const url = new URL(target);
        url.searchParams.set("tb_force_reload", String(Date.now()));
        return url.toString();
      }

      function reloadTensorBoard() {
        iframe.src = cacheBustedUrl();
        const now = new Date().toLocaleTimeString();
        status.textContent = `TensorBoard reloaded ${now}; every ${seconds}s`;
      }

      reloadTensorBoard();
      window.setInterval(reloadTensorBoard, seconds * 1000);
    </script>
  </body>
</html>
